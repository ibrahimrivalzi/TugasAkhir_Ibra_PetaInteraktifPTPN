        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

                interactive: true,
                dataVar: 'json_BatasAfdeling_3',
                layerName: 'layer_BatasAfdeling_3_' + afdName,
                pane: 'pane_BatasAfdeling_3',
                onEachFeature: pop_BatasAfdeling_3,
                filter: function(feature) {
                    return String(feature.properties['Afd']) === afdName;
                },
                style: function(feature) {
                    return style_BatasAfdeling_3_0(feature);
                },
            });
        }

        var layer_AFD_A = makeAfdelingLayer('AFDELING A');
        var layer_AFD_B = makeAfdelingLayer('AFDELING B');
        var layer_AFD_C = makeAfdelingLayer('AFDELING C');
        var layer_AFD_D = makeAfdelingLayer('AFDELING D');
        var layer_AFD_E = makeAfdelingLayer('AFDELING E');
        var layer_AFD_F = makeAfdelingLayer('AFDELING F');
        var layer_AFD_G = makeAfdelingLayer('AFDELING G');
        var layer_AFD_H = makeAfdelingLayer('AFDELING H');

        // Add to bounds (but don't show until selected)
        bounds_group.addLayer(layer_AFD_A);
        bounds_group.addLayer(layer_AFD_B);
        bounds_group.addLayer(layer_AFD_C);
        bounds_group.addLayer(layer_AFD_D);
        bounds_group.addLayer(layer_AFD_E);
        bounds_group.addLayer(layer_AFD_F);
        bounds_group.addLayer(layer_AFD_G);
        bounds_group.addLayer(layer_AFD_H);

        // ===== End split =====

        function pop_Jalan_4(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    if (typeof layer.closePopup == 'function') {
                        layer.closePopup();
                    } else {
                        layer.eachLayer(function(feature){
                            feature.closePopup()
                        });
                    }
                },
                mouseover: highlightFeature,
            });
        }

        function style_Jalan_4_0() {
            return {
                pane: 'pane_Jalan_4',
                opacity: 1,
                color: 'rgba(196,60,57,1.0)',
                dashArray: '',
                lineCap: 'square',
                lineJoin: 'bevel',
                weight: 3.0,
                fillOpacity: 0,
                interactive: true,
            }
        }
        map.createPane('pane_Jalan_4');
        map.getPane('pane_Jalan_4').style.zIndex = 404;
        map.getPane('pane_Jalan_4').style['mix-blend-mode'] = 'normal';
        var layer_Jalan_4 = new L.geoJson(json_Jalan_4, {
            attribution: '',
            interactive: true,
            dataVar: 'json_Jalan_4',
            layerName: 'layer_Jalan_4',
            pane: 'pane_Jalan_4',
            onEachFeature: pop_Jalan_4,
            style: style_Jalan_4_0,
        });
        bounds_group.addLayer(layer_Jalan_4);
        var overlaysTree = [
            {label: '<img src="legend/Jalan_4.png" /> Jalan', layer: layer_Jalan_4},

            // Group: Batas Afdeling (berisi A-H)
            {label: 'Batas Afdeling', children: [
                {label: '<img src="legend/BatasAfdeling_3_AFDELINGA0.png" /> AFDELING A', layer: layer_AFD_A},
                {label: '<img src="legend/BatasAfdeling_3_AFDELINGB1.png" /> AFDELING B', layer: layer_AFD_B},
                {label: '<img src="legend/BatasAfdeling_3_AFDELINGC2.png" /> AFDELING C', layer: layer_AFD_C},
                {label: '<img src="legend/BatasAfdeling_3_AFDELINGD3.png" /> AFDELING D', layer: layer_AFD_D},
                {label: '<img src="legend/BatasAfdeling_3_AFDELINGE4.png" /> AFDELING E', layer: layer_AFD_E},
                {label: '<img src="legend/BatasAfdeling_3_AFDELINGF5.png" /> AFDELING F', layer: layer_AFD_F},
                {label: '<img src="legend/BatasAfdeling_3_AFDELINGG6.png" /> AFDELING G', layer: layer_AFD_G},
                {label: '<img src="legend/BatasAfdeling_3_AFDELINGH7.png" /> AFDELING H', layer: layer_AFD_H},
            ]},

            {label: 'Penggunaan_Lahan_Perkebunan', children: [
                {label: '<img src="legend/Penggunaan_Lahan_Perkebunan_2_AreaTidakDitanamiSemakRawa0.png" /> Area Tidak Ditanami/ Semak/ Rawa', layer: layer_Penggunaan_Lahan_Perkebunan_2_AreaTidakDitanamiSemakRawa},
                {label: '<img src="legend/Penggunaan_Lahan_Perkebunan_2_Bangunan1.png" /> Bangunan', layer: layer_Penggunaan_Lahan_Perkebunan_2_Bangunan},
                {label: '<img src="legend/Penggunaan_Lahan_Perkebunan_2_Kuburan2.png" /> Kuburan', layer: layer_Penggunaan_Lahan_Perkebunan_2_Kuburan},
                {label: '<img src="legend/Penggunaan_Lahan_Perkebunan_2_TanamanKopi3.png" /> Tanaman Kopi', layer: layer_Penggunaan_Lahan_Perkebunan_2_TanamanKopi},
                {label: '<img src="legend/Penggunaan_Lahan_Perkebunan_2_TanamanTeh4.png" /> Tanaman Teh', layer: layer_Penggunaan_Lahan_Perkebunan_2_TanamanTeh},
            ]},


            {label: 'Area_Tanam_Dan_Area_Non_Tanam', children: [
                {label: '<img src="legend/area_Tanam_dan_Non_Tannam_1_AreaNontanam0.png" /> AREA NON TANAM', layer: layer_AREA_NONTANAM},
                {label: '<img src="legend/area_Tanam_dan_Non_Tannam_1_AreaTanam1.png" /> AREA TANAM', layer: layer_AREA_TANAM},
            ]},
            {label: "ESRI Satellite", layer: layer_ESRISatellite_0, radioGroup: 'bm' },]
        var lay = L.control.layers.tree(null, overlaysTree,{

            //namedToggle: true,
            //selectorBack: false,
            //closedSymbol: '&#8862; &#x1f5c0;',
            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: true,
        });
        lay.addTo(map);
        setBounds();
        // Labels for Afdeling (now split into layers)
        var i = 0;
        var afdelingLayers = [layer_AFD_A, layer_AFD_B, layer_AFD_C, layer_AFD_D, layer_AFD_E, layer_AFD_F, layer_AFD_G, layer_AFD_H];
        afdelingLayers.forEach(function(afdLayer) {
            afdLayer.eachLayer(function(layer) {
                var context = {
                    feature: layer.feature,
                    variables: {}
                };
                layer.bindTooltip((layer.feature.properties['Afd'] !== null?String('<div style="color: #ffffff; font-size: 5pt; font-family: \'Rockwell\', sans-serif;">' + layer.feature.properties['Afd']) + '</div>':''), {permanent: true, offset: [-0, -16], className: 'css_BatasAfdeling_3'});
                labels.push(layer);
                totalMarkers += 1;
                layer.added = true;
                addLabel(layer, i);
                i++;
            });
        });
        resetLabels(afdelingLayers);
        map.on("zoomend", function(){
            resetLabels(afdelingLayers);
        });
        map.on("layeradd", function(){
            resetLabels(afdelingLayers);
        });
        map.on("layerremove", function(){
            resetLabels(afdelingLayers);
        });

        </script>        
    </body>
</html>
